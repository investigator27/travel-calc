<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <script>
  (function () {
    var theme = 'light';
    try {
      var saved = localStorage.getItem('travelCalcTheme');
      if (saved === 'dark' || saved === 'light') theme = saved;
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches) theme = 'dark';
    } catch (e) {}
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.style.backgroundColor = theme === 'dark' ? '#171614' : '#ffffff';
    document.documentElement.style.colorScheme = theme;
    var meta = document.querySelector('meta[name="theme-color"]:not([media])');
    if (!meta) {
      meta = document.createElement('meta');
      meta.name = 'theme-color';
      document.head.appendChild(meta);
    }
    meta.content = theme === 'dark' ? '#171614' : '#ffffff';
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#171614" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="Install Toolbox on Android (Chrome) — travel calculator, hotels, and field tools." />
  <title>Install Toolbox (Android)</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon-192.png" />
  <script>
  (function () {
    var path = location.pathname.replace(/\/?index\.html$/i, '');
    var base = path.endsWith('/') ? path : path + '/';
    window.__TOOLBOX_PAGE_BASE__ = base;
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register(base + 'service-worker.js', { scope: base }).catch(function () {});
    }
  })();
  </script>
  <style>
    :root {
      --color-bg: #ffffff;
      --color-surface: #ffffff;
      --color-surface-offset: #f4f4f5;
      --color-border: #e4e4e7;
      --color-text: #18181b;
      --color-text-muted: #71717a;
      --color-primary: #dc2626;
      --color-primary-hover: #b91c1c;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-lg: 1.125rem;
      --shadow-sm: 0 1px 2px rgb(0 0 0 / 0.06);
    }
    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-offset: #22211f;
      --color-border: #393836;
      --color-text: #e2e0db;
      --color-text-muted: #aaa8a2;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 400 var(--text-base) / 1.5 system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      padding: max(env(safe-area-inset-top), var(--space-4)) var(--space-4) max(env(safe-area-inset-bottom), var(--space-6));
    }
    .wrap { max-width: 28rem; margin: 0 auto; display: grid; gap: var(--space-5); }
    .hero { text-align: center; display: grid; gap: var(--space-3); justify-items: center; }
    .logo {
      width: 72px; height: 72px; border-radius: 18px;
      background: var(--color-surface) url('./assets/icon-192.png') center/130% no-repeat;
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-sm);
    }
    h1 { font-size: var(--text-lg); font-weight: 700; line-height: 1.2; }
    .tagline { font-size: var(--text-sm); color: var(--color-text-muted); max-width: 22rem; }
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      display: grid;
      gap: var(--space-4);
      justify-items: center;
      text-align: center;
    }
    .card h2 { font-size: var(--text-sm); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); }
    .qr-wrap{
      display:inline-flex;
      justify-content:center;
      align-items:center;
      width:fit-content;
      max-width:100%;
      margin:0 auto;
      padding:0.5rem;
      border-radius:var(--radius-lg);
      background:#fff;
      line-height:0;
    }
    #qrCanvas, .qr-img{
      display:block;
      width:min(240px, calc(100vw - 5rem));
      height:auto;
      aspect-ratio:1;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 52px; width: 100%; padding: 0 var(--space-4);
      border-radius: var(--radius-lg); font-weight: 700; font-size: var(--text-base);
      text-decoration: none; border: none; cursor: pointer;
    }
    .btn-primary { background: var(--color-primary); color: #fff; }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-secondary {
      background: var(--color-surface-offset);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }
    .steps { text-align: left; font-size: var(--text-sm); color: var(--color-text-muted); padding-left: 1.2rem; display: grid; gap: var(--space-2); }
    .steps strong { color: var(--color-text); }
    details {
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
    }
    details + details { margin-top: var(--space-2); }
    summary { font-weight: 700; cursor: pointer; font-size: var(--text-sm); }
    details .steps { margin-top: var(--space-3); }
    .hint { font-size: var(--text-sm); color: var(--color-text-muted); text-align: center; line-height: 1.5; }
    .install-callout{
      font-size:var(--text-sm);
      line-height:1.5;
      padding:var(--space-3) var(--space-4);
      border-radius:var(--radius-lg);
      background:var(--color-surface-offset);
      border:1px solid var(--color-border);
      text-align:center;
    }
    .install-callout strong{color:var(--color-text)}
    .browser-dialog{
      border:none;
      padding:0;
      max-width:min(22rem,calc(100vw - 2rem));
      width:100%;
      border-radius:var(--radius-xl);
      background:var(--color-surface);
      color:var(--color-text);
      box-shadow:0 12px 40px rgb(0 0 0 / .22);
    }
    .browser-dialog::backdrop{background:rgb(0 0 0 / .45)}
    .browser-dialog__inner{padding:var(--space-5);display:grid;gap:var(--space-4)}
    .browser-dialog__title{margin:0;font-size:var(--text-lg);font-weight:700;text-align:center}
    .browser-dialog__sub{margin:0;font-size:var(--text-sm);color:var(--color-text-muted);text-align:center;line-height:1.45}
    .browser-picker{display:grid;gap:var(--space-2)}
    .browser-picker .btn{min-height:48px}
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <div class="logo" role="img" aria-label="Toolbox"></div>
      <h1>Toolbox</h1>
      <p class="tagline">Android · Chrome</p>
    </header>

    <section class="card" aria-labelledby="qr-heading">
      <h2 id="qr-heading">Scan to install</h2>
      <div class="qr-wrap" id="qrWrap">
        <canvas id="qrCanvas" width="240" height="240" aria-label="QR code for install link"></canvas>
      </div>
    </section>

    <p class="install-callout" id="installCallout" role="status"></p>

    <div class="actions" style="display:grid;gap:var(--space-3);">
      <button type="button" class="btn btn-primary" id="installBtn">Install on this phone</button>
      <a class="btn btn-secondary" id="openAppBtn" href="surveillance-travel-calculator.html">Open Toolbox</a>
      <button type="button" class="btn btn-secondary" id="openDesktopBtn">Open on Desktop</button>
    </div>

    <section class="card hidden" id="installStepsPanel" aria-live="polite">
      <ol class="steps" id="installStepsList"></ol>
    </section>
  </main>

  <dialog class="browser-dialog" id="desktopBrowserDialog" aria-labelledby="desktopBrowserDialogTitle">
    <div class="browser-dialog__inner">
      <h2 class="browser-dialog__title" id="desktopBrowserDialogTitle">Open in browser</h2>
      <p class="browser-dialog__sub">Choose Firefox, Chrome, or Edge to open Toolbox on your computer.</p>
      <div class="browser-picker" role="group" aria-label="Desktop browser">
        <button type="button" class="btn btn-secondary" data-browser="firefox">Firefox</button>
        <button type="button" class="btn btn-secondary" data-browser="chrome">Chrome</button>
        <button type="button" class="btn btn-secondary" data-browser="edge">Edge</button>
      </div>
      <button type="button" class="btn btn-secondary" id="desktopBrowserCancel">Cancel</button>
    </div>
  </dialog>

  <script>
  (function () {
    var CANONICAL_INSTALL_URL = 'https://investigator27.github.io/investigator-toolbox/';
    function normalizeInstallBase(url) {
      var u = (url || '').trim().replace(/\/?index\.html$/i, '');
      return u.endsWith('/') ? u : u + '/';
    }
    var path = location.pathname.replace(/\/?index\.html$/i, '');
    var pageBase = window.__TOOLBOX_PAGE_BASE__
      || (path.endsWith('/') ? path : path + '/');
    var installUrl = CANONICAL_INSTALL_URL
      ? normalizeInstallBase(CANONICAL_INSTALL_URL)
      : normalizeInstallBase(location.origin + pageBase);
    var appUrl = installUrl + 'surveillance-travel-calculator.html';

    var openAppBtn = document.getElementById('openAppBtn');
    if (openAppBtn) openAppBtn.href = appUrl;

    var isAndroid = /Android/i.test(navigator.userAgent);
    var isIOS = /iPad|iPhone|iPod/i.test(navigator.userAgent);
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches;
    var ua = navigator.userAgent || '';
    var isInAppBrowser = /FBAN|FBAV|Instagram|Line\/|MicroMessenger|Twitter/i.test(ua);

    var installBtn = document.getElementById('installBtn');
    var installCallout = document.getElementById('installCallout');
    var actionsEl = document.querySelector('.actions');
    var deferredPrompt = null;
    var installReady = false;
    var launchScheduled = false;

    function setCallout(text) {
      if (installCallout) installCallout.textContent = text;
    }

    function markInstallReady() {
      installReady = true;
      if (!installBtn || installBtn.disabled) return;
      installBtn.disabled = false;
      installBtn.textContent = 'Install on this phone';
      setCallout('Tap Install on this phone.');
    }

    function blockNonAndroid() {
      setCallout('Install on this phone is Android only. Use Open on Desktop below.');
      if (installBtn) {
        installBtn.disabled = true;
        installBtn.textContent = 'Android only';
      }
    }

    var desktopBrowserDialog = document.getElementById('desktopBrowserDialog');
    var openDesktopBtn = document.getElementById('openDesktopBtn');

    function openInDesktopBrowser(browserId) {
      var target = appUrl;
      try {
        if (browserId === 'edge') {
          window.location.href = 'microsoft-edge:' + target;
        } else if (browserId === 'firefox') {
          window.location.href = 'firefox://open-url?url=' + encodeURIComponent(target);
        } else if (browserId === 'chrome') {
          window.location.href = 'googlechrome://' + target.replace(/^https:\/\//i, 'https://');
        }
      } catch (err) {}
      window.setTimeout(function () {
        var opened = window.open(target, '_blank', 'noopener');
        if (!opened) window.location.href = target;
      }, 350);
      try {
        navigator.clipboard.writeText(target);
      } catch (err) {}
      if (desktopBrowserDialog) desktopBrowserDialog.close();
      var label = browserId.charAt(0).toUpperCase() + browserId.slice(1);
      setCallout('Opening in ' + label + '. Link copied if the browser did not start.');
    }

    if (openDesktopBtn && desktopBrowserDialog) {
      openDesktopBtn.addEventListener('click', function () {
        if (typeof desktopBrowserDialog.showModal === 'function') {
          desktopBrowserDialog.showModal();
          return;
        }
        var pick = window.prompt('Open Toolbox in:\n1 = Firefox\n2 = Chrome\n3 = Edge', '2');
        if (pick === '1') openInDesktopBrowser('firefox');
        else if (pick === '3') openInDesktopBrowser('edge');
        else if (pick === '2') openInDesktopBrowser('chrome');
      });
      desktopBrowserDialog.querySelectorAll('[data-browser]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          openInDesktopBrowser(btn.getAttribute('data-browser'));
        });
      });
      var cancelBtn = document.getElementById('desktopBrowserCancel');
      if (cancelBtn) {
        cancelBtn.addEventListener('click', function () {
          desktopBrowserDialog.close();
        });
      }
    }

    function launchToolboxAfterInstall() {
      if (launchScheduled) return;
      launchScheduled = true;
      setCallout('Installed! Opening Toolbox…');
      if (installBtn) {
        installBtn.disabled = false;
        installBtn.textContent = 'Open Toolbox';
      }
      window.setTimeout(function () {
        window.location.replace(appUrl);
      }, 500);
    }

    function runInstallPrompt() {
      if (!deferredPrompt) return false;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function (choice) {
        if (choice && choice.outcome === 'accepted') {
          window.setTimeout(function () {
            if (!launchScheduled) launchToolboxAfterInstall();
          }, 2500);
        }
      }).finally(function () {
        deferredPrompt = null;
        installReady = false;
        if (installBtn && !launchScheduled) installBtn.disabled = true;
      });
      return true;
    }

    window.addEventListener('appinstalled', function () {
      if (!isAndroid) return;
      launchToolboxAfterInstall();
    });

    if (!isAndroid && (isIOS || !/Mobile/i.test(ua))) {
      blockNonAndroid();
    } else if (isStandalone) {
      setCallout('Already installed — open Toolbox from your home screen.');
      if (installBtn) {
        installBtn.textContent = 'Installed';
        installBtn.disabled = true;
      }
    } else if (isInAppBrowser) {
      setCallout('Open this page in Chrome (⋮ → Open in browser).');
      if (installBtn) installBtn.disabled = true;
    } else if (installBtn) {
      installBtn.disabled = true;
      installBtn.textContent = 'Preparing install…';
      setCallout('Preparing install…');
    }

    window.addEventListener('beforeinstallprompt', function (e) {
      if (!isAndroid || isStandalone) return;
      e.preventDefault();
      deferredPrompt = e;
      markInstallReady();
    });

    if (installBtn) {
      installBtn.addEventListener('click', function () {
        if (!isAndroid || isStandalone) return;
        if (installBtn.textContent === 'Open Toolbox') {
          window.location.href = appUrl;
          return;
        }
        if (runInstallPrompt()) return;
        try {
          sessionStorage.setItem('toolboxPwaInstall', '1');
        } catch (err) {}
        window.location.href = appUrl + (appUrl.indexOf('?') >= 0 ? '&' : '?') + 'install=1';
      });
    }

    if (isAndroid && !isStandalone && !isInAppBrowser && 'serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(function () {
        if (!installReady && installBtn && !deferredPrompt) {
          installBtn.disabled = false;
          installBtn.textContent = 'Install on this phone';
          setCallout('Tap Install on this phone.');
        }
      }).catch(function () {});
    }

    window.__TOOLBOX_INSTALL_URL__ = installUrl;

    (function renderInstallQr() {
      var canvas = document.getElementById('qrCanvas');
      if (!canvas) return;

      function showQrImage() {
        var img = document.createElement('img');
        img.className = 'qr-img';
        img.width = 240;
        img.height = 240;
        img.alt = 'QR code — scan to install Toolbox';
        img.decoding = 'async';
        img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=10&data='
          + encodeURIComponent(installUrl);
        canvas.replaceWith(img);
      }

      var qrOptions = {
        width: 240,
        margin: 2,
        errorCorrectionLevel: 'M',
        color: { dark: '#18181b', light: '#ffffff' },
      };

      var fallbackTimer = window.setTimeout(showQrImage, 5000);

      function drawWithModule(mod) {
        var QRCode = mod.default || mod;
        return QRCode.toCanvas(canvas, installUrl, qrOptions);
      }

      var cdnUrls = [
        'https://cdn.jsdelivr.net/npm/qrcode@1.5.4/+esm',
        'https://esm.sh/qrcode@1.5.4?bundle',
      ];

      function tryCdn(index) {
        if (index >= cdnUrls.length) {
          window.clearTimeout(fallbackTimer);
          showQrImage();
          return;
        }
        import(cdnUrls[index])
          .then(drawWithModule)
          .then(function () {
            window.clearTimeout(fallbackTimer);
          })
          .catch(function () {
            tryCdn(index + 1);
          });
      }

      try {
        tryCdn(0);
      } catch (err) {
        window.clearTimeout(fallbackTimer);
        showQrImage();
      }
    })();
  })();
  </script>
</body>
</html>
